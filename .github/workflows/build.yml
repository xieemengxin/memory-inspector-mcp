name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  mingw-linux:
    name: MinGW-w64 (Ubuntu 24.04)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW-w64 + build tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            mingw-w64 \
            mingw-w64-tools \
            cmake \
            ninja-build

      - name: Select posix thread model for MinGW
        # std::thread / std::mutex requires the posix thread runtime. Ubuntu
        # ships both win32 and posix variants; force posix explicitly.
        run: |
          sudo update-alternatives --set x86_64-w64-mingw32-gcc /usr/bin/x86_64-w64-mingw32-gcc-posix
          sudo update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix
          x86_64-w64-mingw32-g++ --version

      - name: Configure
        run: |
          cmake -S dll -B dll/build \
            -DCMAKE_TOOLCHAIN_FILE=$(pwd)/dll/toolchain-mingw-w64.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja

      - name: Build
        run: cmake --build dll/build --parallel --verbose

      - name: Strip DLL
        run: x86_64-w64-mingw32-strip --strip-unneeded dll/build/inspector.dll

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: inspector-dll-${{ github.sha }}
          path: dll/build/inspector.dll
          if-no-files-found: error

  release-asset:
    name: Attach DLL to release
    needs: mingw-linux
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: inspector-dll-${{ github.sha }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: inspector.dll
